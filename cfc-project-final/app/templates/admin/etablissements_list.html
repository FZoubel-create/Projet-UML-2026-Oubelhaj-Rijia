{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>GESTION ÉTABLISSEMENTS</h1>
        <a href="{{ url_for('admin.create_etablissement') }}" class="btn btn-primary"><i
                class="bi bi-building-add me-2"></i>Nouveau</a>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for etab in etablissements %}
        <div class="col">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body">
                    <h3 class="fw-bold text-primary">{{ etab.code }}</h3>
                    <h5 class="card-title">{{ etab.nom }}</h5>
                    <p class="text-muted"><i class="bi bi-geo-alt me-1"></i>{{ etab.ville }}</p>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span class="badge bg-light text-dark border align-self-center">{{ etab.formations|length }}
                            Formations</span>
                        <div class="btn-group">
                            <a href="{{ url_for('admin.edit_etablissement', id=etab.id) }}"
                                class="btn btn-sm btn-outline-dark"><i class="bi bi-pencil me-1"></i>Éditer</a>
                            <form action="{{ url_for('admin.delete_etablissement', id=etab.id) }}" method="POST"
                                onsubmit="return confirm('Attention : Supprimer un établissement supprimera potentiellement ses données liées. Continuer ?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger ms-1"><i
                                        class="bi bi-trash"></i></button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
