{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Paramètres Globaux du Système</h2>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Liste des paramètres</div>
                <ul class="list-group list-group-flush">
                    {% for p in params %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <strong>{{ p.key }}</strong> : {{ p.value }}
                            <br><small class="text-muted">{{ p.description }}</small>
                        </div>
                        <button class="btn btn-sm btn-outline-primary"
                            onclick="editParam('{{ p.key }}', '{{ p.value }}', '{{ p.description }}')">
                            Modifier
                        </button>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Ajouter / Modifier</div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label>Clé (ex: ANNEE_UNIV)</label>
                            <input type="text" name="key" id="key" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Valeur (ex: 2025-2026)</label>
                            <input type="text" name="value" id="value" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <input type="text" name="description" id="description" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary mt-3">Enregistrer</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function editParam(key, value, desc) {
        document.getElementById('key').value = key;
        document.getElementById('value').value = value;
        document.getElementById('description').value = desc;
    }
</script>
{% endblock %}
