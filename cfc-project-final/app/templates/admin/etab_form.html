{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0 fw-bold"><i class="bi bi-building-add me-2"></i>Nouvel Établissement</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Code (Abréviation)</label>
                            <input type="text" name="code" class="form-control form-control-lg"
                                placeholder="ex: FST, ENCG" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nom Complet</label>
                            <input type="text" name="nom" class="form-control"
                                placeholder="ex: Faculté des Sciences et Techniques" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Ville</label>
                            <input type="text" name="ville" class="form-control" placeholder="ex: Béni Mellal">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('admin.super_dashboard') }}"
                                class="btn btn-outline-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary px-4">Créer l'Établissement</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
